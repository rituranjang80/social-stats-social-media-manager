name: Tests

# Runs on every PR + push to main/develop. Two parallel jobs:
#   • backend  — Django unit + integration tests via `manage.py test`.
#   • frontend — `npm run build` for type/import safety, then `npm test`
#                (Jest + React Testing Library).
#
# Both jobs are read-only — no deploys, no secrets uploaded. The existing
# `security.yml` workflow handles SAST + dep-CVE scans on the same triggers.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true


jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Backend — Django test suite (230+ tests across all stages)
  # ───────────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Django tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER:     socialstats
          POSTGRES_PASSWORD: socialstats
          POSTGRES_DB:       socialstats_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U socialstats"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install Python deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # requirements-dev.txt — testing extras (pytest, factories, etc.)
          # Skip if absent; manage.py test uses the stdlib runner anyway.
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run Django tests
        working-directory: backend
        env:
          # Pointing at the service containers above. settings.py reads these
          # via os.environ when present.
          DATABASE_URL:       postgres://socialstats:socialstats@localhost:5432/socialstats_test
          REDIS_URL:          redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: dashboard.settings
          SECRET_KEY:         test-secret-not-for-prod
          DEBUG:              "False"
          ANTHROPIC_API_KEY:  ""   # AI tests stub the client
          ALLOWED_HOSTS:      "*"
        run: |
          python manage.py test social_stats.tests --verbosity=1


  # ───────────────────────────────────────────────────────────────────────
  # Frontend — build + Jest/RTL unit tests
  # ───────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — build + Jest tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit

      - name: Production build
        working-directory: frontend
        env:
          # CI=true makes CRA treat warnings as errors (catches regressions).
          CI: "true"
        run: npm run build

      - name: Run Jest tests
        working-directory: frontend
        env:
          CI: "true"
        run: npm test
