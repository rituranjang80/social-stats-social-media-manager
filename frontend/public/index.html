<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fafbfc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#06080c" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Statox AI — the marketing OS for modern teams. Manage analytics, content, conversations, and ads across Facebook, Instagram, YouTube, LinkedIn, and Google Business in one place." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Statox AI" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#fafbfc" />

    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preconnect to font + analytics origins so the connection is warm
         when the requests fire. dns-prefetch is the legacy fallback. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://plausible.io" />
    <link rel="dns-prefetch" href="https://plausible.io" />

    <!-- Inter loaded async to avoid blocking first paint. The print/all
         media swap is the standard "non-blocking stylesheet" trick:
         CSS isn't applied during render but downloads in parallel, then
         the onload swaps it to all media. <noscript> covers JS-disabled. -->
    <link rel="preload"
          as="style"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
          media="print"
          onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    </noscript>

    <!-- iOS splash screens -->
    <link rel="apple-touch-startup-image" href="%PUBLIC_URL%/favicon.png" />

    <title>Statox AI — The marketing OS for modern teams</title>
    <style>
      /* Prevent overscroll bounce on iOS */
      html { overscroll-behavior: none; }
      body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Statox AI.</noscript>
    <div id="root"></div>
  </body>
</html>
